name: 🐛 Bug Report
description: Report a bug in Synapse
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the
        sections below to help us reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Synapse version
      description: 'Run `python -c "import synapse; print(synapse.__version__)"`'
      placeholder: e.g. 0.2.8
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: Framework adapter (if any)
      options:
        - "Not using an adapter (raw protocol)"
        - autogen
        - crewai
        - langgraph
        - smolagents
        - agno
        - llama_index
        - pydantic_ai
        - openai_agents
        - google_adk
        - hermes
        - openclaw (TypeScript)
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.11.8
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 22.04 / macOS 14.4 / Windows 11
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, complete example. Code block preferred.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback / error output
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/arajgor1/synapse/blob/main/CODE_OF_CONDUCT.md)
          required: true
