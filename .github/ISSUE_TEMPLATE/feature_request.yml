name: 💡 Feature Request
description: Suggest a new feature, adapter, or enhancement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Synapse? Tell us about it.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New framework adapter
        - Protocol extension (new envelope type, new field)
        - SDK improvement (Python or TypeScript)
        - UI enhancement (the cooperative-build dashboard)
        - Bench / benchmark addition
        - Docs improvement
        - Integration (Discord bot, Slack, etc.)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or scenario this would address.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd see this working. Mockups, code sketches, links to similar things in other projects all welcome.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you discarded them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related issues, screenshots.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/arajgor1/synapse/blob/main/CODE_OF_CONDUCT.md)
          required: true
