<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#5b8fff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Node graph: 5 pillar nodes joined as envelope flow -->
  <g filter="url(#glow)">
    <!-- Spokes from center to each pillar -->
    <line x1="80" y1="80" x2="35"  y2="55"  stroke="url(#g)" stroke-width="2"/>
    <line x1="80" y1="80" x2="35"  y2="105" stroke="url(#g)" stroke-width="2"/>
    <line x1="80" y1="80" x2="125" y2="40"  stroke="url(#g)" stroke-width="2"/>
    <line x1="80" y1="80" x2="125" y2="80"  stroke="url(#g)" stroke-width="2"/>
    <line x1="80" y1="80" x2="125" y2="120" stroke="url(#g)" stroke-width="2"/>

    <!-- Center hub: the Synapse session -->
    <circle cx="80"  cy="80"  r="10" fill="#e6e8ec" opacity="0.95"/>

    <!-- 5 pillar nodes -->
    <circle cx="35"  cy="55"  r="7" fill="#5b8fff"/> <!-- Audit          -->
    <circle cx="35"  cy="105" r="7" fill="#a78bfa"/> <!-- Observability  -->
    <circle cx="125" cy="40"  r="7" fill="#4ade80"/> <!-- Conflict       -->
    <circle cx="125" cy="80"  r="7" fill="#f59e0b"/> <!-- Intent         -->
    <circle cx="125" cy="120" r="7" fill="#ef4444"/> <!-- NLA / reasoning-->
  </g>

  <!-- Wordmark -->
  <text x="170" y="80"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="46" font-weight="700"
        fill="#e6e8ec" letter-spacing="-0.02em">
    Synapse
  </text>

  <!-- Tagline line 1: the five pillars -->
  <text x="172" y="108"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="12" fill="#a1a8b3" letter-spacing="0.04em">
    audit · observability · conflict · intent · reasoning
  </text>

  <!-- Tagline line 2: who it's for -->
  <text x="172" y="128"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="12" fill="#6a7280" font-style="italic">
    one envelope log across vendor SDKs
  </text>
</svg>
